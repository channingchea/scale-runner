name: scale_runner
description: "Scale Runner — a MIDI piano practice app for drilling scales, chords, and scale-running, with on-screen keys or a real keyboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # MIDI: USB + Bluetooth LE MIDI on iOS (CoreMIDI) and Android (Android MIDI API).
  flutter_midi_command: ^0.5.1

  # Persist which scales/chords the user has enabled, across launches.
  shared_preferences: ^2.5.5

  # Brand fonts: Inter (UI) + Space Grotesk (display).
  google_fonts: ^6.2.1

  # Metronome click playback (SystemSound is silent on iOS/macOS).
  audioplayers: ^6.6.0

  # In-app purchases via RevenueCat — wraps StoreKit + Google Play Billing,
  # handles server-side receipt validation and the "pro" entitlement.
  purchases_flutter: ^9.15.0


# Vendored copy of flutter_midi_command 0.5.4 with the dead `jcenter()`
# repository removed from android/build.gradle.kts (JCenter was shut down and
# is unresolved on current Gradle/AGP). Remove this override once upstream ships a fix.
dependency_overrides:
  flutter_midi_command:
    path: third_party/flutter_midi_command

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2

flutter_native_splash:
  color: "#171E28"
  image: assets/icon/app_icon.png
  ios: true
  android: true
  web: false
  android_12:
    color: "#171E28"
    image: assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#171E28"
  adaptive_icon_background: "#171E28"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon_macos.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/icon/
